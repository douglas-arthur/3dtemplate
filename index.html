<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CIRCLR 3D Visualizer - Drop & Tap</title>
    <style>
        body {
            margin: 0; padding: 0; overflow: hidden;
            background-color: #0d0f12;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            touch-action: none;
        }
        #canvas-container { width: 100vw; height: 100vh; }
        
        
        #drop-zone {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background-color: rgba(13, 15, 18, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
            color: #ffffff;
            z-index: 9999;
            transition: opacity 0.4s ease, pointer-events 0.4s ease;
            border: 4px dashed rgba(255, 255, 255, 0.2);
            box-sizing: border-box;
            cursor: pointer; /* Indicates it's clickable */
        }

        #drop-zone.dragover {
            background-color: rgba(24, 30, 40, 0.95);
            border-color: #00bcd4;
        }

        .drop-icon {
            font-size: 48px;
            opacity: 0.7;
        }

        .loading-text {
            font-size: 13px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            text-align: center;
            line-height: 1.6;
            padding: 0 20px;
        }

        .sub-text {
            font-size: 11px;
            opacity: 0.5;
            margin-top: 8px;
        }
        
        #ui-layer-control {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20, 24, 30, 0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 260px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            z-index: 10;
            opacity: 0; 
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .ui-row {
            display: flex; justify-content: space-between;
            font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; opacity: 0.6;
        }

        input[type="range"] {
            -webkit-appearance: none; width: 100%; height: 4px;
            background: rgba(255,255,255,0.2); border-radius: 2px;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 22px; height: 22px;
            background: #fff; border-radius: 50%; cursor: pointer;
        }

        .btn-group { display: flex; flex-direction: column; gap: 10px; }
        
        .ui-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            padding: 14px;
            border-radius: 8px;
            font-size: 11px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            outline: none;
        }
        .ui-btn:active { background: rgba(255, 255, 255, 0.2); transform: scale(0.98); }
    </style>
</head>
<body>

    <input type="file" id="file-picker" multiple accept="image/*" style="display: none;">

    <div id="drop-zone">
        <div class="drop-icon">📂</div>
        <div class="loading-text" id="drop-text">
            Drag & Drop or Tap to Upload Layers
            <div class="sub-text">Supports PNG/JPG. Mobile users can select multiple files from the Files App.</div>
        </div>
    </div>

    <div id="canvas-container"></div>

    <div id="ui-layer-control">
        <div class="ui-row"><span>Layer Spacing</span><span id="spacing-val">0.15</span></div>
        <input type="range" id="spacing-slider" min="0.0" max="0.5" step="0.01" value="0.15">
        
        <div class="ui-row"><span>Camera Zoom</span></div>
        <input type="range" id="zoom-slider" min="0" max="100" step="1" value="50">
        
        <div class="btn-group">
            <button id="reset-btn" class="ui-btn">Reset View (Auto-Spin)</button>
            <button id="center-btn" class="ui-btn">Camera Center (Flat)</button>
            <button id="clear-btn" class="ui-btn" style="background: rgba(255,255,255,0.05);">Upload New Files</button>
            <button id="hide-ui-btn" class="ui-btn" style="background: rgba(255,55,55,0.1); border-color: rgba(255,55,55,0.2);">Hide UI for Screenshot</button>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const ANGLED_CAM_POS = { x: 0, y: 6, z: -10 }; 
        const FLAT_CAM_POS = { x: 0, y: 0, z: -11 };

        let scene, camera, renderer, controls;
        let meshesArray = [];
        let currentSpacing = 0.15;
        
        const dropZone = document.getElementById('drop-zone');
        const dropText = document.getElementById('drop-text');
        const uiPanel = document.getElementById('ui-layer-control');
        const filePicker = document.getElementById('file-picker');

        function initThree() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(ANGLED_CAM_POS.x, ANGLED_CAM_POS.y, ANGLED_CAM_POS.z);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.autoRotate = true;      
            controls.autoRotateSpeed = 0.4;  
            controls.minDistance = 0.001; 
            controls.maxDistance = 25;

            controls.addEventListener('start', () => {
                controls.autoRotate = false;
            });

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            setupUIEventListeners();
            animate();
        }

        function setupFileLoadingHandlers() {
            
            ['dragenter', 'dragover'].forEach(eventName => {
                window.addEventListener(eventName, (e) => {
                    e.preventDefault();
                    dropZone.classList.add('dragover');
                }, false);
            });

            ['dragleave', 'drop'].forEach(eventName => {
                window.addEventListener(eventName, (e) => {
                    e.preventDefault();
                    dropZone.classList.remove('dragover');
                }, false);
            });

            window.addEventListener('drop', (e) => {
                const files = Array.from(e.dataTransfer.files).filter(file => file.type.startsWith('image/'));
                processFiles(files);
            }, false);

            
            dropZone.addEventListener('click', () => {
                filePicker.click(); // Force trigger system file menu
            });

            
            filePicker.addEventListener('change', (e) => {
                const files = Array.from(e.target.files).filter(file => file.type.startsWith('image/'));
                processFiles(files);
            });
        }

        
        function processFiles(files) {
            if (files.length === 0) {
                alert("Please select valid image files (PNG/JPG).");
                return;
            }

            
            files.sort((a, b) => a.name.localeCompare(b.name, undefined, {numeric: true, sensitivity: 'base'}));

            dropText.innerHTML = `Loading ${files.length} Layers...`;
            dropZone.style.border = "none";

            clearCurrentLayers();

            const textureLoader = new THREE.TextureLoader();
            let loadedCount = 0;

            files.forEach((file, index) => {
                const reader = new FileReader();
                
                reader.onload = function(event) {
                    textureLoader.load(event.target.result, (texture) => {
                        const geometry = new THREE.PlaneGeometry(4, 4);
                        const material = new THREE.MeshBasicMaterial({
                            map: texture, 
                            transparent: true, 
                            side: THREE.DoubleSide, 
                            depthWrite: true,
                            depthTest: true
                        });
                        
                        const mesh = new THREE.Mesh(geometry, material);
                        mesh.userData.index = index;
                        scene.add(mesh);
                        meshesArray.push(mesh);
                        
                        loadedCount++;

                        if (loadedCount === files.length) {
                            meshesArray.sort((a, b) => a.userData.index - b.userData.index);
                            updatePositions();
                            
                            dropZone.style.opacity = '0';
                            dropZone.style.pointerEvents = 'none';
                            uiPanel.style.opacity = '1';
                            uiPanel.style.pointerEvents = 'auto';
                        }
                    });
                };
                reader.readAsDataURL(file);
            });
        }

        function clearCurrentLayers() {
            meshesArray.forEach(mesh => {
                scene.remove(mesh);
                mesh.geometry.dispose();
                if (mesh.material.map) mesh.material.map.dispose();
                mesh.material.dispose();
            });
            meshesArray = [];
            filePicker.value = ""; 
        }

        function updatePositions() {
            if (meshesArray.length === 0) return;
            const startZ = ((meshesArray.length - 1) * currentSpacing) / 2;
            meshesArray.forEach((m, i) => m.position.z = startZ - (i * currentSpacing));
        }

        function sliderToDistance(value) {
            const minDst = 0.01; 
            const maxDst = 20.0; 
            return minDst * Math.pow(maxDst / minDst, value / 100);
        }

        function distanceToSlider(distance) {
            const minDst = 0.01;
            const maxDst = 20.0;
            return (Math.log(distance / minDst) / Math.log(maxDst / minDst)) * 100;
        }

        function setupUIEventListeners() {
            document.getElementById('center-btn').addEventListener('click', () => {
                controls.autoRotate = false; 
                camera.position.set(FLAT_CAM_POS.x, FLAT_CAM_POS.y, FLAT_CAM_POS.z);
                controls.target.set(0, 0, 0);
                controls.update();
            });

            document.getElementById('reset-btn').addEventListener('click', () => {
                camera.position.set(ANGLED_CAM_POS.x, ANGLED_CAM_POS.y, ANGLED_CAM_POS.z);
                controls.target.set(0, 0, 0);
                controls.autoRotate = true; 
                controls.update();
            });

            document.getElementById('spacing-slider').addEventListener('input', (e) => {
                currentSpacing = parseFloat(e.target.value);
                document.getElementById('spacing-val').textContent = currentSpacing.toFixed(2);
                updatePositions();
            });

            document.getElementById('zoom-slider').addEventListener('input', (e) => {
                const targetDistance = sliderToDistance(parseFloat(e.target.value));
                const direction = new THREE.Vector3().subVectors(camera.position, controls.target).normalize();
                camera.position.copy(controls.target).addScaledVector(direction, targetDistance);
                controls.update();
            });

            controls.addEventListener('change', () => {
                const zoomSlider = document.getElementById('zoom-slider');
                if (zoomSlider) {
                    const distance = camera.position.distanceTo(controls.target);
                    zoomSlider.value = distanceToSlider(distance);
                }
            });

            document.getElementById('clear-btn').addEventListener('click', () => {
                clearCurrentLayers();
                uiPanel.style.opacity = '0';
                uiPanel.style.pointerEvents = 'none';
                dropText.innerHTML = `Drag & Drop or Tap to Upload Layers<div class="sub-text">Supports PNG/JPG. Mobile users can select multiple files from the Files App.</div>`;
                dropZone.style.opacity = '1';
                dropZone.style.pointerEvents = 'auto';
                dropZone.style.border = "4px dashed rgba(255, 255, 255, 0.2)";
                controls.autoRotate = true;
            });

            const hideBtn = document.getElementById('hide-ui-btn');
            let isUiHidden = false;
            let isDraggingCanvas = false;

            hideBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                uiPanel.style.transition = 'opacity 0.4s ease';
                uiPanel.style.opacity = '0';
                uiPanel.style.pointerEvents = 'none'; 
                setTimeout(() => { isUiHidden = true; }, 100);
            });

            window.addEventListener('mousedown', () => { isDraggingCanvas = false; });
            window.addEventListener('mousemove', () => { isDraggingCanvas = true; });
            window.addEventListener('touchstart', () => { isDraggingCanvas = false; });
            window.addEventListener('touchmove', () => { isDraggingCanvas = true; });

            const showUI = () => {
                if (isUiHidden && !isDraggingCanvas) {
                    uiPanel.style.opacity = '1';
                    uiPanel.style.pointerEvents = 'auto';
                    isUiHidden = false;
                }
            };

            window.addEventListener('mouseup', showUI);
            window.addEventListener('touchend', showUI);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        initThree();
        setupFileLoadingHandlers();
    </script>
</body>
</html>
